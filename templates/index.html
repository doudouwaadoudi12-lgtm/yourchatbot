<!DOCTYPE html>
<html>
<head>
    <title>Chatbot FAQ</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        button {
            margin: 8px;
            padding: 12px;
            width: 250px;
            border-radius: 10px;
            border: none;
            background: #007BFF;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>

<body>

    <h1>🤖 Chatbot FAQ</h1>
    <p>Choisissez une question :</p>

    <!-- 🔵 Suggestions -->
    <form method="POST">
        {% for q in suggestions %}
            <button type="submit" name="question" value="{{ q }}">
                {{ q }}
            </button>
        {% endfor %}
    </form>

    <!-- 🔵 Result -->
    <div class="result">
        {{ result }}
    </div>

</body>
</html>
